spring.application.name=internship_system
server.port=8080

# --- PostgreSQL connection ---
# Create the DB once with:  createdb internship_db
#
# Username/password come from environment variables so every teammate can use
# their own local Postgres credentials without editing this committed file.
# DB_USERNAME / DB_PASSWORD default to postgres/postgres if not set.
# Set your own in IntelliJ: Run/Debug Configurations -> Environment variables
# (e.g. DB_PASSWORD=yourpassword) or export them in your shell profile.
spring.datasource.url=jdbc:postgresql://localhost:5432/internship_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# 'update' = Hibernate creates/alters tables to match @Entity classes.
# Good for learning; switch to 'validate' or use Flyway/Liquibase for production.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
