spring.application.name=internship_system
server.port=8080

# --- PostgreSQL connection ---
# Create the DB once with:  createdb internship_db
spring.datasource.url=jdbc:postgresql://localhost:5432/internship_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# 'update' = Hibernate creates/alters tables to match @Entity classes.
# Good for learning; switch to 'validate' or use Flyway/Liquibase for production.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
